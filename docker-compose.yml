services:
  backend:
    build:
      context: ./backend
    container_name: medical-agent-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    container_name: medical-agent-worker
    command: ["python", "-m", "app.worker"]
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    container_name: medical-agent-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
